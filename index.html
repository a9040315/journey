<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧸 大手牽小手旅行 (回饋編輯版) ✈️💖</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="importmap">
    {
        "imports": {
            "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
            "firebase/database": "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"
        }
    }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Noto+Serif+TC:wght@400;700&display=swap');
        :root { --jp-indigo: #3E517A; --jp-cream: #FAF7F0; --jp-charcoal: #333333; --jp-accent-red: #B74F41; --jp-bamboo: #7F9A65; }
        body { font-family: 'Noto Sans TC', sans-serif; background-color: var(--jp-cream); color: var(--jp-charcoal); }
        h1, .serif-font { font-family: 'Noto Serif TC', serif; }
        .table-cell { padding: 10px; border-bottom: 1px solid #e5e7eb; vertical-align: middle; }
        .header-cell { background-color: var(--jp-indigo); color: white; padding: 12px; position: sticky; top: 0; z-index: 10; font-size: 0.85rem; }
        .tab-btn { padding: 12px 24px; font-weight: 600; cursor: pointer; transition: 0.3s; border-bottom: 3px solid transparent; }
        .active-tab { color: var(--jp-indigo); border-bottom: 3px solid var(--jp-indigo); }
        .mini-select { background: #f3f4f6; border: 1px solid #e5e7eb; border-radius: 4px; padding: 2px 4px; font-size: 11px; color: #4b5563; cursor: pointer; }
        .mini-select:disabled { opacity: 0.7; cursor: default; background: transparent; border: none; -webkit-appearance: none; }
        .editable-content { padding: 2px 4px; border-radius: 4px; transition: 0.2s; }
        .is-editing .editable-content { background: #fff9c4; border: 1px solid #facc15; outline: none; }
        /* 編輯樣式 */
        .reward-rate-editor { background: transparent; border: none; width: 35px; text-align: center; font-weight: bold; }
        .reward-amt-editor { background: transparent; border: none; width: 45px; text-align: left; font-weight: bold; }
        .is-editing .reward-rate-editor, .is-editing .reward-amt-editor { background: #fff9c4; border: 1px solid #facc15; border-radius: 4px; }
        .date-editor { background: transparent; border: none; font-size: 10px; color: #9ca3af; cursor: pointer; }
        .is-editing .date-editor { background: #fff9c4; color: #333; }
        .move-btn { color: #4b5563; transition: 0.2s; padding: 4px; line-height: 1; display: block; font-size: 12px; text-align: center; }
        .move-btn:hover { color: var(--jp-indigo); background: #e5e7eb; border-radius: 4px; }
    </style>
</head>
<body class="p-2 sm:p-8">
    <div class="max-w-6xl mx-auto bg-white shadow-2xl rounded-xl overflow-hidden border border-stone-200">
        <header class="p-6 bg-[var(--jp-indigo)] text-white flex justify-between items-center">
            <h1 class="text-2xl font-bold serif-font tracking-widest">🧸 大手牽小手 ✈️💖</h1>
            <span id="syncStatus" class="text-[10px] bg-white/20 px-3 py-1 rounded-full text-red-200">🔴 連線中...</span>
        </header>

        <div class="flex bg-stone-100 border-b overflow-x-auto">
            <div onclick="switchPage('itinerary')" id="tab-itinerary" class="tab-btn active-tab whitespace-nowrap">📅 行程</div>
            <div onclick="switchPage('split')" id="tab-split" class="tab-btn whitespace-nowrap">💰 記帳與統計</div>
        </div>

        <div id="split-page" class="p-4 sm:p-6 hidden">
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                <div class="space-y-6">
                    <div class="bg-stone-50 p-6 rounded-xl border border-stone-200">
                        <h2 class="text-lg font-bold mb-4 serif-font text-[var(--jp-indigo)]">💸 新增支出</h2>
                        <div class="grid grid-cols-2 gap-2 mb-2">
                            <input type="date" id="expDateInput" class="p-2 border rounded text-sm">
                            <input type="text" id="expName" placeholder="項目名稱" class="p-2 border rounded text-sm">
                        </div>
                        <div class="grid grid-cols-3 gap-2 mb-2">
                            <select id="expCurrency" class="p-2 border rounded bg-white text-sm font-bold">
                                <option value="JPY">日圓 ¥</option>
                                <option value="TWD">台幣 $</option>
                            </select>
                            <input type="number" id="expAmount" placeholder="金額" class="col-span-2 p-2 border rounded text-sm">
                        </div>
                        <div class="grid grid-cols-2 gap-2 mb-2">
                            <select id="expMethod" onchange="toggleCardField()" class="p-2 border rounded bg-white text-sm">
                                <option value="JPY_CASH">💴 日圓現金</option>
                                <option value="TWD_CASH">💵 台幣現金</option>
                                <option value="CARD">💳 刷卡付款</option>
                            </select>
                            <select id="expPayer" class="p-2 border rounded bg-white text-sm">
                                <option value="Ruby">Ruby 付款</option>
                                <option value="Wen">Wen 付款</option>
                            </select>
                        </div>
                        <div id="cardRewardSection" class="hidden space-y-2 mb-2 bg-blue-50 p-3 rounded border border-blue-100">
                            <div class="grid grid-cols-2 gap-2">
                                <select id="expCardType" class="p-1 border rounded bg-white text-xs font-bold text-blue-800">
                                    <option value="台新Richart">💳 台新Richart</option>
                                    <option value="中信cube">💳 中信cube</option>
                                    <option value="玉山熊本熊">💳 玉山熊本熊</option>
                                    <option value="玉山unicard">💳 玉山unicard</option>
                                </select>
                                <div class="flex items-center gap-2">
                                    <span class="text-xs font-bold text-blue-700">回饋%</span>
                                    <input type="number" id="expRewardRate" value="3" step="0.1" class="w-full p-1 border rounded text-sm">
                                </div>
                            </div>
                            <div class="text-right text-[10px] text-blue-500 italic" id="rewardPreview">預計回饋: $0</div>
                        </div>

                        <input type="text" id="expNote" placeholder="備註" class="w-full p-2 border rounded text-sm mb-4">
                        <div class="bg-white p-3 rounded border border-stone-200 mb-4">
                            <p class="text-[10px] font-bold text-stone-400 mb-2 uppercase">分帳或代購對象</p>
                            <div class="flex flex-wrap gap-4 text-sm">
                                <label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" id="splitRuby" checked> Ruby</label>
                                <label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" id="splitWen" checked> Wen</label>
                                <label class="flex items-center gap-2 cursor-pointer text-orange-600 font-medium"><input type="checkbox" id="splitRBuy"> R代購</label>
                                <label class="flex items-center gap-2 cursor-pointer text-blue-600 font-medium"><input type="checkbox" id="splitWBuy"> W代購</label>
                            </div>
                        </div>
                        <button onclick="addExpense()" class="w-full bg-[var(--jp-bamboo)] text-white py-2 rounded-lg font-bold shadow-md hover:opacity-90">加入帳單</button>
                    </div>
                    <div>
                        <div class="flex justify-between items-center mb-2 border-b pb-1">
                            <h3 class="font-bold text-sm text-stone-500">支出明細 (按日期排序)</h3>
                            <select id="dateFilter" onchange="renderExpenses()" class="text-[11px] border rounded px-2 py-1 bg-white text-stone-600">
                                <option value="all">📅 全部日期</option>
                            </select>
                        </div>
                        <div id="expenseHistory" class="space-y-2 max-h-[600px] overflow-y-auto pr-1"></div>
                    </div>
                </div>
                <div class="space-y-6">
                    <div id="settlementReport" class="bg-white p-6 rounded-xl border-2 border-[var(--jp-indigo)] shadow-lg space-y-6"></div>
                    <div class="grid grid-cols-2 gap-2">
                        <button onclick="exportToText()" class="bg-sky-600 text-white py-3 rounded-lg font-bold text-sm shadow-md">💬 複製 LINE 報表</button>
                        <button onclick="clearAllExpenses()" class="bg-red-50 text-red-500 py-3 rounded-lg text-sm font-medium border border-red-100">🗑️ 清空帳單</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="itinerary-page" class="p-4 sm:p-6">
            <div class="flex justify-between items-center mb-6">
                <button onclick="addRow()" class="bg-[var(--jp-indigo)] text-white px-6 py-2 rounded-lg">+ 新增行程點</button>
                <div class="text-xs font-bold bg-stone-100 px-4 py-2 rounded-full border">
                    匯率: 1 JPY = <input type="number" id="rateInput" step="0.001" class="w-12 bg-transparent text-center border-b border-stone-400" onchange="updateRate(this.value)"> TWD
                </div>
            </div>
            <div class="overflow-x-auto border rounded-lg">
                <table class="w-full text-left border-collapse min-w-[800px]">
                    <thead>
                        <tr>
                            <th class="header-cell">時間</th><th class="header-cell">方式</th><th class="header-cell">地點</th><th class="header-cell">Map</th><th class="header-cell text-right">預算(J)</th><th class="header-cell">✕</th>
                        </tr>
                    </thead>
                    <tbody id="itineraryBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "firebase/app";
        import { getDatabase, ref, set, onValue } from "firebase/database";
        const firebaseConfig = {
            apiKey: "AIzaSyB3x-4mcHCIjbrqxQKrMiw_McjzDKLJRM",
            authDomain: "journey-b926c.firebaseapp.com",
            databaseURL: "https://journey-b926c-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "journey-b926c",
            storageBucket: "journey-b926c.firebasestorage.app",
            messagingSenderId: "45463991790",
            appId: "1:45463991790:web:c5315240a49d2fdcf50aff"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const travelRef = ref(db, 'trips/journey_data');
        let travelData = { itinerary: [], expenses: [], rate: 0.22 };
        document.getElementById('expDateInput').valueAsDate = new Date();

        onValue(travelRef, (snapshot) => {
            const data = snapshot.val();
            if (data) {
                let needsUpdate = false;
                travelData = data;
                if(!travelData.itinerary) travelData.itinerary = [];
                if(!travelData.expenses) travelData.expenses = [];
                travelData.expenses.forEach((e, idx) => { if (e.sortOrder === undefined) { e.sortOrder = idx; needsUpdate = true; } });
                if(needsUpdate) pushToCloud();
                document.getElementById('syncStatus').innerHTML = "🟢 雲端同步中";
                updateDateFilterOptions(); renderTable(); renderExpenses();
            }
        });

        function pushToCloud() { set(travelRef, travelData); }
        
        window.toggleCardField = () => {
            const method = document.getElementById('expMethod').value;
            const section = document.getElementById('cardRewardSection');
            section.classList.toggle('hidden', method !== 'CARD');
        };

        window.addExpense = () => {
            const date = document.getElementById('expDateInput').value;
            const name = document.getElementById('expName').value;
            const amtRaw = parseFloat(document.getElementById('expAmount').value);
            const currency = document.getElementById('expCurrency').value;
            const method = document.getElementById('expMethod').value;
            const payer = document.getElementById('expPayer').value;
            const note = document.getElementById('expNote').value;
            const rate = travelData.rate || 0.22;
            
            const rewardRate = method === 'CARD' ? parseFloat(document.getElementById('expRewardRate').value) || 0 : 0;
            const cardType = method === 'CARD' ? document.getElementById('expCardType').value : "";

            const splitWith = [];
            if(document.getElementById('splitRuby').checked) splitWith.push('Ruby');
            if(document.getElementById('splitWen').checked) splitWith.push('Wen');
            if(document.getElementById('splitRBuy').checked) splitWith.push('R代購');
            if(document.getElementById('splitWBuy').checked) splitWith.push('W代購');
            
            if(!name || !amtRaw || !date) return alert("請輸入完整資訊");
            
            let amtJPY = currency === 'JPY' ? amtRaw : Math.round(amtRaw / rate);
            let amtTWD = currency === 'TWD' ? amtRaw : Math.round(amtRaw * rate);
            let rewardAmt = method === 'CARD' ? Math.round(amtTWD * (rewardRate / 100)) : 0;

            const maxOrder = travelData.expenses.filter(e => e.date === date).reduce((max, e) => Math.max(max, e.sortOrder || 0), -1);
            
            travelData.expenses.push({ 
                id: Date.now(), date, name, amt: amtJPY, amtTWD: amtTWD, 
                method, payer, splitWith, note: note || "", 
                sortOrder: maxOrder + 1,
                rewardRate: rewardRate,
                rewardAmt: rewardAmt,
                cardType: cardType 
            });
            
            document.getElementById('expName').value = ''; 
            document.getElementById('expAmount').value = ''; 
            document.getElementById('expNote').value = '';
            pushToCloud();
        };

        window.renderExpenses = () => {
            const historyDiv = document.getElementById('expenseHistory');
            const reportDiv = document.getElementById('settlementReport');
            const filterDate = document.getElementById('dateFilter').value;
            const exps = travelData.expenses || [];
            const sortedExps = exps.slice().sort((a,b) => {
                if (b.date !== a.date) return new Date(b.date) - new Date(a.date);
                return (b.sortOrder || 0) - (a.sortOrder || 0);
            });
            const filteredExps = filterDate === 'all' ? sortedExps : sortedExps.filter(e => e.date === filterDate);
            
            historyDiv.innerHTML = filteredExps.map((e) => `
                <div id="exp-card-${e.id}" class="bg-white p-3 rounded shadow-sm border border-stone-100 text-sm">
                    <div class="flex justify-between items-start mb-2">
                        <div class="flex items-start gap-3 flex-1">
                            <div class="flex flex-col bg-stone-50 rounded border border-stone-200 p-0.5">
                                <button onclick="moveExpense(${e.id}, 1)" class="move-btn">▲</button>
                                <button onclick="moveExpense(${e.id}, -1)" class="move-btn">▼</button>
                            </div>
                            <div class="flex flex-col flex-1">
                                <span class="font-bold text-[var(--jp-indigo)] editable-content name-val">${e.name}</span>
                                <div class="flex flex-wrap items-center gap-2 text-[10px] text-stone-400 mt-1">
                                    <span>📅 <input type="date" value="${e.date}" disabled class="date-editor" onchange="updateExpField(${e.id}, 'date', this.value)"></span>
                                    <span class="bg-stone-100 px-1 rounded">📝 <span class="editable-content note-val">${e.note || '無備註'}</span></span>
                                    ${e.method === 'CARD' ? `
                                    <span class="bg-blue-50 text-blue-600 px-1 rounded font-medium">
                                        💳 ${e.cardType || '未指定'} | 🎁 <input type="number" step="0.1" value="${e.rewardRate || 0}" disabled class="reward-rate-editor rate-val" oninput="autoCalcReward(${e.id}, this.value)">% ($<input type="number" value="${e.rewardAmt || 0}" disabled class="reward-amt-editor amt-val">)
                                    </span>` : ''}
                                </div>
                            </div>
                        </div>
                        <div class="flex gap-3 ml-2">
                            <button onclick="toggleEditMode(this, ${e.id})" class="text-blue-500 text-xs font-bold whitespace-nowrap">✏️ 編輯</button>
                            <button onclick="deleteExpense(${e.id})" class="text-stone-300">✕</button>
                        </div>
                    </div>
                    <div class="flex items-center gap-3 mb-3 bg-stone-50 p-2 rounded border border-stone-100 ml-9">
                        <span class="text-[10px] text-stone-400 font-bold">台幣 $</span><span class="editable-content twd-val font-bold text-stone-800">${e.amtTWD}</span>
                        <span class="text-[10px] text-stone-400">日圓 ¥</span><span class="editable-content jpy-val text-stone-500">${e.amt}</span>
                    </div>
                    <div class="flex flex-wrap gap-2 justify-between items-center text-[11px] ml-9">
                        <div class="flex gap-2 items-center">
                            <select onchange="updateExpField(${e.id}, 'payer', this.value)" class="mini-select" disabled>
                                <option value="Ruby" ${e.payer==='Ruby'?'selected':''}>Ruby 付</option>
                                <option value="Wen" ${e.payer==='Wen'?'selected':''}>Wen 付</option>
                            </select>
                            <select onchange="updateExpField(${e.id}, 'method', this.value)" class="mini-select" disabled>
                                <option value="JPY_CASH" ${e.method==='JPY_CASH'?'selected':''}>💴 日圓現</option>
                                <option value="TWD_CASH" ${e.method==='TWD_CASH'?'selected':''}>💵 台幣現</option>
                                <option value="CARD" ${e.method==='CARD'?'selected':''}>💳 刷卡</option>
                            </select>
                            ${e.method === 'CARD' ? `
                            <select onchange="updateExpField(${e.id}, 'cardType', this.value)" class="mini-select bg-blue-50" disabled>
                                <option value="台新Richart" ${e.cardType==='台新Richart'?'selected':''}>台新Richart</option>
                                <option value="中信cube" ${e.cardType==='中信cube'?'selected':''}>中信cube</option>
                                <option value="玉山熊本熊" ${e.cardType==='玉山熊本熊'?'selected':''}>玉山熊本熊</option>
                                <option value="玉山unicard" ${e.cardType==='玉山unicard'?'selected':''}>玉山unicard</option>
                            </select>` : ''}
                        </div>
                        <div class="flex flex-wrap gap-2 bg-white px-2 py-1 rounded border border-stone-200">
                            <label><input type="checkbox" disabled ${(e.splitWith||[]).includes('Ruby')?'checked':''} onclick="toggleSplitMember(${e.id}, 'Ruby')"> R</label>
                            <label><input type="checkbox" disabled ${(e.splitWith||[]).includes('Wen')?'checked':''} onclick="toggleSplitMember(${e.id}, 'Wen')"> W</label>
                            <label class="text-orange-600"><input type="checkbox" disabled ${(e.splitWith||[]).includes('R代購')?'checked':''} onclick="toggleSplitMember(${e.id}, 'R代購')"> R代</label>
                            <label class="text-blue-600"><input type="checkbox" disabled ${(e.splitWith||[]).includes('W代購')?'checked':''} onclick="toggleSplitMember(${e.id}, 'W代購')"> W代</label>
                        </div>
                    </div>
                </div>`).join('');

            let stats = { displayTotal: 0, rPaid: 0, wPaid: 0, rShare: 0, wShare: 0, rJpy: 0, wJpy: 0, rBuyTwd: 0, wBuyTwd: 0, rBuyJpy: 0, wBuyJpy: 0, rPersTwd: 0, wPersTwd: 0, totalReward: 0 };
            exps.forEach(e => {
                const twd = e.amtTWD || 0; const jpy = e.amt || 0; const split = e.splitWith || [];
                const isBuy = split.includes('R代購') || split.includes('W代購');
                const reward = e.rewardAmt || 0;
                
                if(split.length > 0) {
                    const shTwd = twd / split.length; const shJpy = jpy / split.length;
                    const shReward = reward / split.length;

                    if(e.method !== 'JPY_CASH') {
                        if(!isBuy) stats.displayTotal += twd;
                        if(e.payer === 'Ruby') stats.rPaid += (twd - reward); else stats.wPaid += (twd - reward);
                        stats.totalReward += reward;

                        if(split.includes('Ruby')) { stats.rShare += (shTwd - shReward); stats.rPersTwd += shTwd; }
                        if(split.includes('Wen')) { stats.wShare += (shTwd - shReward); stats.wPersTwd += shTwd; }
                        if(split.includes('R代購')) { stats.rShare += (shTwd - shReward); stats.rBuyTwd += shTwd; }
                        if(split.includes('W代購')) { stats.wShare += (shTwd - shReward); stats.wBuyTwd += shTwd; }
                    } else {
                        if(split.includes('Ruby')) stats.rJpy += shJpy; if(split.includes('Wen')) stats.wJpy += shJpy;
                        if(split.includes('R代購')) stats.rBuyJpy += shJpy; if(split.includes('W代購')) stats.wBuyJpy += shJpy;
                    }
                }
            });
            const rubyBal = stats.rPaid - stats.rShare;
            reportDiv.innerHTML = `
                <div class="text-center border-b pb-4">
                    <p class="text-[10px] text-stone-400 mb-1 uppercase tracking-widest">🌍 總公費支出 (排除日現/代購)</p>
                    <p class="text-4xl font-black text-[var(--jp-indigo)]">$${Math.round(stats.displayTotal).toLocaleString()}</p>
                    <p class="text-[11px] font-bold text-blue-600 mt-2">✨ 已節省信用卡回饋：$${Math.round(stats.totalReward).toLocaleString()}</p>
                </div>
                <div class="grid grid-cols-1 gap-3 mt-4">
                    <div class="bg-indigo-50 p-4 rounded-xl border border-indigo-100 flex justify-between items-center shadow-sm">
                        <span class="text-indigo-900 font-bold">👤 Ruby 代墊 (扣回饋)</span>
                        <span class="text-2xl font-black text-indigo-700">$${Math.round(stats.rPaid).toLocaleString()}</span>
                    </div>
                    <div class="bg-emerald-50 p-4 rounded-xl border border-emerald-100 flex justify-between items-center shadow-sm">
                        <span class="text-emerald-900 font-bold">👤 Wen 代墊 (扣回饋)</span>
                        <span class="text-2xl font-black text-emerald-700">$${Math.round(stats.wPaid).toLocaleString()}</span>
                    </div>
                </div>
                <div class="mt-4 p-5 rounded-xl text-center border-2 border-[var(--jp-accent-red)] bg-rose-50">
                    <p class="text-xs font-bold text-rose-800 mb-1">最終結算 (台幣補給，已扣除回饋)</p>
                    ${Math.abs(rubyBal) < 1 ? '<p class="font-bold">✨ 互不相欠</p>' : `
                        <p class="text-lg font-black text-rose-900">${rubyBal < 0 ? 'Ruby 應補給 Wen' : 'Wen 應補給 Ruby'}</p>
                        <p class="text-3xl font-black text-rose-600">$${Math.abs(Math.round(rubyBal)).toLocaleString()}</p>
                    `}
                </div>`;
        };

        window.autoCalcReward = (id, rateVal) => {
            const card = document.getElementById(`exp-card-${id}`);
            const twdText = card.querySelector('.twd-val').innerText.replace(/[^\d.-]/g, '');
            const twd = parseFloat(twdText) || 0;
            const rate = parseFloat(rateVal) || 0;
            card.querySelector('.amt-val').value = Math.round(twd * (rate / 100));
        };

        window.toggleEditMode = (btn, id) => {
            const card = document.getElementById(`exp-card-${id}`);
            const isEditing = card.classList.toggle('is-editing');
            const fields = { 
                name: card.querySelector('.name-val'), 
                note: card.querySelector('.note-val'), 
                twd: card.querySelector('.twd-val'), 
                jpy: card.querySelector('.jpy-val'), 
                date: card.querySelector('.date-editor'),
                rateInput: card.querySelector('.rate-val'),
                amtInput: card.querySelector('.amt-val'),
                selects: card.querySelectorAll('select'), 
                checks: card.querySelectorAll('input[type="checkbox"]')
            };
            if (isEditing) {
                btn.innerHTML = '✅ 儲存'; btn.classList.replace('text-blue-500', 'text-green-600');
                fields.name.contentEditable = fields.note.contentEditable = fields.twd.contentEditable = fields.jpy.contentEditable = true;
                fields.date.disabled = false; 
                if(fields.rateInput) fields.rateInput.disabled = false; 
                if(fields.amtInput) fields.amtInput.disabled = false;
                fields.selects.forEach(s => s.disabled = false); fields.checks.forEach(c => c.disabled = false); fields.name.focus();
            } else {
                btn.innerHTML = '✏️ 編輯'; btn.classList.replace('text-green-600', 'text-blue-500');
                fields.name.contentEditable = fields.note.contentEditable = fields.twd.contentEditable = fields.jpy.contentEditable = false;
                fields.date.disabled = true; 
                if(fields.rateInput) fields.rateInput.disabled = true; 
                if(fields.amtInput) fields.amtInput.disabled = true;
                fields.selects.forEach(s => s.disabled = true); fields.checks.forEach(c => c.disabled = true);
                const idx = travelData.expenses.findIndex(e => e.id === id);
                if(idx !== -1) {
                    travelData.expenses[idx].name = fields.name.innerText;
                    travelData.expenses[idx].note = fields.note.innerText === '無備註' ? "" : fields.note.innerText;
                    const newTwd = parseFloat(fields.twd.innerText.replace(/[^\d.-]/g, '')) || 0;
                    travelData.expenses[idx].amtTWD = newTwd;
                    travelData.expenses[idx].amt = parseFloat(fields.jpy.innerText.replace(/[^\d.-]/g, '')) || 0;
                    travelData.expenses[idx].date = fields.date.value;
                    
                    if(fields.rateInput) {
                        travelData.expenses[idx].rewardRate = parseFloat(fields.rateInput.value) || 0;
                        travelData.expenses[idx].rewardAmt = Math.round(parseFloat(fields.amtInput.value)) || 0;
                    }

                    const sels = fields.selects;
                    sels.forEach(s => {
                        const onchangeAttr = s.getAttribute('onchange');
                        if(onchangeAttr && onchangeAttr.includes('updateExpField')) {
                            const fieldName = onchangeAttr.split("'")[1];
                            travelData.expenses[idx][fieldName] = s.value;
                        }
                    });
                    pushToCloud();
                }
            }
        };

        window.updateExpField = (id, field, val) => { const idx = travelData.expenses.findIndex(e => e.id === id); if(idx !== -1) { travelData.expenses[idx][field] = val; pushToCloud(); } };
        window.toggleSplitMember = (id, member) => {
            const idx = travelData.expenses.findIndex(e => e.id === id);
            if(idx !== -1) {
                let current = travelData.expenses[idx].splitWith || [];
                current = current.includes(member) ? current.filter(m => m !== member) : [...current, member];
                travelData.expenses[idx].splitWith = current; pushToCloud();
            }
        };

        window.moveExpense = (id, direction) => {
            const idx = travelData.expenses.findIndex(e => e.id === id);
            if (idx === -1) return;
            const exp = travelData.expenses[idx];
            const dateExps = travelData.expenses.filter(e => e.date === exp.date).sort((a,b) => (a.sortOrder||0) - (b.sortOrder||0));
            const currentIdxInDate = dateExps.findIndex(e => e.id === id);
            const targetIdxInDate = currentIdxInDate - direction;
            if (targetIdxInDate >= 0 && targetIdxInDate < dateExps.length) {
                const swapTarget = dateExps[targetIdxInDate];
                const tempOrder = exp.sortOrder;
                exp.sortOrder = swapTarget.sortOrder;
                swapTarget.sortOrder = tempOrder;
                pushToCloud();
            }
        };

        window.deleteExpense = (id) => { if(confirm("確定刪除？")) { travelData.expenses = travelData.expenses.filter(e => e.id !== id); pushToCloud(); } };
        window.addRow = () => { travelData.itinerary.push({ time: "09:00", trans: "🚶 步行", location: "新點", mapUrl: "", amount: 0 }); pushToCloud(); };
        window.updateCell = (idx, field, val) => { travelData.itinerary[idx][field] = field === 'amount' ? parseFloat(val) || 0 : val; pushToCloud(); };
        window.deleteRow = (idx) => { if(confirm("刪除？")) { travelData.itinerary.splice(idx, 1); pushToCloud(); } };
        window.updateRate = (v) => { travelData.rate = parseFloat(v); pushToCloud(); };
        window.renderTable = () => {
            document.getElementById('itineraryBody').innerHTML = travelData.itinerary.map((item, i) => `
                <tr class="hover:bg-stone-50 border-b text-sm">
                    <td class="table-cell"><input type="time" value="${item.time}" onchange="updateCell(${i}, 'time', this.value)" class="bg-transparent"></td>
                    <td class="table-cell" contenteditable="true" onblur="updateCell(${i}, 'trans', this.innerText)">${item.trans}</td>
                    <td class="table-cell font-bold" contenteditable="true" onblur="updateCell(${i}, 'location', this.innerText)">${item.location}</td>
                    <td class="table-cell text-[10px] text-blue-500 truncate max-w-[100px]" contenteditable="true" onblur="updateCell(${i}, 'mapUrl', this.innerText)">${item.mapUrl || '貼上連結'}</td>
                    <td class="table-cell text-right"><input type="number" value="${item.amount}" class="text-right w-16 bg-transparent" onblur="updateCell(${i}, 'amount', this.value)"></td>
                    <td class="table-cell text-center"><button onclick="deleteRow(${i})" class="text-stone-300">✕</button></td>
                </tr>`).join('');
            document.getElementById('rateInput').value = travelData.rate || 0.22;
        };

        window.exportToText = () => {
            const exps = travelData.expenses || [];
            let stats = { total: 0, rPaid: 0, wPaid: 0, rShare: 0, wShare: 0, totalReward: 0 };
            let detailList = "";
            
            exps.slice().sort((a,b) => {
                if(a.date !== b.date) return new Date(a.date) - new Date(a.date);
                return (a.sortOrder || 0) - (a.sortOrder || 0);
            }).forEach(e => {
                const twd = e.amtTWD || 0; 
                const split = e.splitWith || [];
                const payerShort = e.payer === 'Ruby' ? 'R' : 'W';
                const isBuy = split.includes('R代購') || split.includes('W代購');
                const reward = e.rewardAmt || 0;
                
                let rewStr = reward > 0 ? `(🎁-$${reward})` : "";
                let cardInfo = e.method === 'CARD' ? `[${e.cardType}]` : "";
                detailList += `▪️ ${e.date.slice(5)} ${e.name}${cardInfo}: ${e.method==='JPY_CASH'?e.amt+'¥':twd+'$'}${rewStr} [付:${payerShort}] (${split.join('/')})\n`;
                
                if(e.method !== 'JPY_CASH' && split.length > 0) {
                    if(!isBuy) stats.total += twd; 
                    stats.totalReward += reward;
                    if(e.payer === 'Ruby') stats.rPaid += (twd - reward); else stats.wPaid += (twd - reward);
                    const sh = (twd - reward) / split.length;
                    if(split.includes('Ruby') || split.includes('R代購')) stats.rShare += sh;
                    if(split.includes('Wen') || split.includes('W代購')) stats.wShare += sh;
                }
            });

            const bal = Math.round(stats.rPaid - stats.rShare);
            const report = `🧸 旅費結算報表\n---\n🌍 公費總計：$${Math.round(stats.total).toLocaleString()}\n✨ 信用卡總回饋：$${Math.round(stats.totalReward).toLocaleString()}\n📊 結果：${bal < 0 ? 'Ruby 應補給 Wen' : 'Wen 應補給 Ruby'} $${Math.abs(bal).toLocaleString()}\n---\n📋 明細：\n${detailList}`;
            
            navigator.clipboard.writeText(report).then(() => alert("已複製包含回饋明細的報表！"));
        };

        window.clearAllExpenses = () => { if(confirm("確定全部清空？")) { travelData.expenses = []; pushToCloud(); } };
        window.switchPage = (p) => {
            document.getElementById('itinerary-page').classList.toggle('hidden', p !== 'itinerary');
            document.getElementById('split-page').classList.toggle('hidden', p !== 'split');
            document.getElementById('tab-itinerary').classList.toggle('active-tab', p === 'itinerary');
            document.getElementById('tab-split').classList.toggle('active-tab', p === 'split');
        };

        function updateDateFilterOptions() {
            const filter = document.getElementById('dateFilter');
            if(!filter) return;
            const currentVal = filter.value;
            const dates = [...new Set(travelData.expenses.map(e => e.date))].sort((a,b) => new Date(b) - new Date(a));
            let html = '<option value="all">📅 全部日期</option>';
            dates.forEach(d => { html += `<option value="${d}">${d}</option>`; });
            filter.innerHTML = html; filter.value = currentVal;
        }

        document.getElementById('expAmount').addEventListener('input', updateRewardPreview);
        document.getElementById('expRewardRate').addEventListener('input', updateRewardPreview);
        document.getElementById('expCurrency').addEventListener('change', updateRewardPreview);

        function updateRewardPreview() {
            const amt = parseFloat(document.getElementById('expAmount').value) || 0;
            const rate = parseFloat(document.getElementById('expRewardRate').value) || 0;
            const curr = document.getElementById('expCurrency').value;
            const exRate = travelData.rate || 0.22;
            let twdAmt = curr === 'TWD' ? amt : amt * exRate;
            let reward = Math.round(twdAmt * (rate / 100));
            document.getElementById('rewardPreview').innerText = `預計回饋: $${reward}`;
        }
    </script>
</body>
</html>
